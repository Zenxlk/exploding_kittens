name: exploding_kittens
description: "Exploding Kittens — Mobile game by ZenXLK"
publish_to: 'none'
version: 0.5.2+30

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Estado ──────────────────────────────────────────
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # ── Navegación ──────────────────────────────────────
  go_router: ^17.3.0

  # ── Modelos inmutables ───────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ── Red ─────────────────────────────────────────────
  web_socket_channel: ^3.0.0
  network_info_plus: ^8.2.0
  multicast_dns: ^0.3.2+1

  # ── Animaciones ─────────────────────────────────────
  lottie: ^3.1.0
  flutter_animate: ^4.5.0

  # ── Audio ────────────────────────────────────────────
  audioplayers: ^6.1.0

  # ── Persistencia ─────────────────────────────────────
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ── Utilidades ───────────────────────────────────────
  equatable: ^2.0.5
  uuid: ^4.5.0
  collection: ^1.18.0
  gap: ^3.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Generación de código
  build_runner: ^2.15.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

  # Testing
  mocktail: ^1.0.4

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/cards/
    - assets/sounds/
    - assets/animations/
    - assets/images/

  fonts:
    - family: ExplodingFont
      fonts:
        - asset: assets/fonts/ExplodingFont-Regular.ttf
